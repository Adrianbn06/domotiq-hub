<script async src="https://www.googletagmanager.com/gtag/js?id=G-J4MP94RSZL"></script>
<script nonce="NONCE_PLACEHOLDER">
  // Variables globales
  let allItems = [];
  let archiveItems = [];
  let currentDealFilter = 'all';

  const icon = p => p === 'Amazon' ? '🛒' : p === 'eBay' ? '🏪' : p === 'Alibaba' ? '📦' : '🌐';

  // Renderizar Noticias
  function renderItems(items) {
    const grid = document.getElementById('grid');
    if (!grid) return;
    const news = items.filter(i => i.type === 'news');
    if (news.length === 0) {
      grid.innerHTML = '<div class="empty-state"><div class="empty-icon">🏠</div><div class="empty-title">Sin noticias hoy</div></div>';
      return;
    }
    grid.innerHTML = news.map((item, i) => {
      const tags = (item.tags||[]).slice(0,2).map(t => `<span class="tag platform">${t}</span>`).join('');
      return `<a class="card" style="animation-delay:${(i*0.04).toFixed(2)}s" href="${item.slug ? '/articulos/'+item.slug+'.html' : (item.url||'#')}" target="${item.slug ? '_self' : '_blank'}" rel="noopener">
        <div class="card-header">
          <div class="card-tags"><span class="tag news">📡 Noticia</span>${tags}</div>
          <span class="card-date">${item.date||''}</span>
        </div>
        <div class="card-title">${item.title}</div>
        <div class="card-body">${item.body}</div>
        <div class="card-footer">
          ${item.source ? `<span class="card-source">${item.source}</span>` : '<span></span>'}
          <span class="read-more">Leer más</span>
        </div>
      </a>`;
    }).join('');
  }

  // Renderizar Ofertas con filtros
  function renderDeals(items, filter) {
    filter = filter || currentDealFilter;
    const grid = document.getElementById('deals-grid');
    if (!grid) return;
    let promos = items.filter(i => i.type === 'promo');
    if (filter !== 'all') {
      promos = promos.filter(i => i.platform && i.platform.toLowerCase() === filter.toLowerCase());
    }
    promos = promos.sort((a,b) => {
      if (a.featured && !b.featured) return -1;
      if (!a.featured && b.featured) return 1;
      const da = parseInt((a.discount||'0').replace(/[^0-9]/g,''));
      const db = parseInt((b.discount||'0').replace(/[^0-9]/g,''));
      return db - da;
    });
    const badge = document.getElementById('deals-count-badge');
    if (badge) badge.textContent = '(' + promos.length + ' ofertas)';
    if (promos.length === 0) {
      grid.innerHTML = '<div class="empty-state"><div class="empty-icon">🏷️</div><div class="empty-title">Sin ofertas en esta categoría</div></div>';
      return;
    }
    grid.innerHTML = promos.map((item, i) => {
      return `<a class="card" style="animation-delay:${(i*0.04).toFixed(2)}s" href="${item.slug ? '/articulos/'+item.slug+'.html' : (item.url||'#')}" target="_blank" rel="sponsored noopener">
        <div class="card-header">
          <div class="card-tags">
            <span class="tag promo">🏷️ Oferta</span>
            ${item.featured ? '<span class="tag featured">🔥 Top</span>' : ''}
            <span class="tag platform">${icon(item.platform)} ${item.platform}</span>
          </div>
          <span class="card-date">${item.date||''}</span>
        </div>
        <div class="card-title">${item.title}</div>
        <div class="card-body">${item.body}</div>
        <div class="card-footer">
          <div style="display:flex;gap:8px;align-items:center;">
            <span class="price-badge">${item.price}</span>
            ${item.discount ? `<span class="discount-badge">${item.discount}</span>` : ''}
          </div>
          <span class="read-more">Ver oferta</span>
        </div>
      </a>`;
    }).join('');
  }

  // Filtrar ofertas por plataforma
  function setDealsFilter(platform) {
    currentDealFilter = platform;
    document.querySelectorAll('[id^="df-"]').forEach(btn => btn.classList.remove('active'));
    const activeBtn = document.getElementById('df-' + platform);
    if (activeBtn) activeBtn.classList.add('active');
    renderDeals(allItems, platform);
  }

  // Renderizar Archivo
  function renderArchive(items) {
    const grid = document.getElementById('archive-grid');
    if (!grid) return;
    if (!items || items.length === 0) {
      grid.innerHTML = '<div class="empty-state"><div class="empty-icon">📚</div><div class="empty-title">Archivo vacío</div></div>';
      return;
    }
    grid.innerHTML = items.slice(0, 30).map((item, i) => {
      return `<a class="card" style="animation-delay:${(i*0.04).toFixed(2)}s" href="${item.slug ? '/articulos/'+item.slug+'.html' : '#'}" target="_self" rel="noopener">
        <div class="card-header">
          <div class="card-tags"><span class="tag ${item.type}">${item.type==='review' ? '⭐ Review' : item.type==='comparativa' ? '⚖️ Comparativa' : item.type==='news' ? '📡 Noticia' : '🏷️ Oferta'}</span></div>
          <span class="card-date">${item.archivedAt||item.date||''}</span>
        </div>
        <div class="card-title">${item.title}</div>
        <div class="card-body">${(item.body||'').slice(0,180)}...</div>
        ${item.rating ? `<div class="rating">⭐ ${item.rating}/10</div>` : ''}
        ${item.winner ? `<div class="verdict">🏆 ${item.winner}</div>` : ''}
        <div class="card-footer"><span></span><span class="read-more">Ver más</span></div>
      </a>`;
    }).join('');
  }

  // Inicialización al cargar la página
  window.addEventListener('DOMContentLoaded', () => {
    try {
      // Leer datos SSG inyectados por cron.js
      const ssgDataEl = document.getElementById('ssg-data');
      if (ssgDataEl) {
        allItems = JSON.parse(ssgDataEl.textContent);
        renderItems(allItems);
        renderDeals(allItems, 'all');
        // Stats
        const newsCount = allItems.filter(i=>i.type==='news').length;
        const promoCount = allItems.filter(i=>i.type==='promo').length;
        const statNews = document.getElementById('stat-news');
        const statPromos = document.getElementById('stat-promos');
        if (statNews) statNews.textContent = newsCount;
        if (statPromos) statPromos.textContent = promoCount;
      } else {
        // Fallback: cargar desde API
        fetch('/api/content').then(r=>r.json()).then(data => {
          if (data.items) { allItems = data.items; renderItems(allItems); renderDeals(allItems,'all'); }
        }).catch(e => console.error('Error API:', e));
      }
      // Cargar archivo histórico siempre desde API
      fetch('/api/archive').then(r=>r.json()).then(data => {
        if (data.items) { archiveItems = data.items; renderArchive(archiveItems); }
      }).catch(e => console.error('Error archivo:', e));
    } catch(err) {
      console.error('Error inicializando:', err);
    }
  });
</script>
